label-background = ${colors.primary}
label-foreground = ${colors.white}
label-padding = 1


[module/xwindow]
type = internal/xwindow
label = %instance%
label-padding = 1
label-foreground = ${colors.foreground}
format-prefix = " ůįáô"
format-prefix-foreground = ${colors.white}


; ===========================================================
