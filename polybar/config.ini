; ===========================================================
; ENERGIA
; ===========================================================

[module/battery]
type = internal/battery
full-at = 99
low-at = 15

# Nomes detectados no seu sistema
battery = BAT1
adapter = ADP1
poll-interval = 5

# --- ESTADO: CARREGANDO ---
format-charging = <animation-charging><label-charging>
# √ćcone de raio no prefixo branco
format-charging-prefix = " ůĪźč "
format-charging-prefix-background = ${colors.white}
format-charging-prefix-foreground = ${colors.background}
