[module/gmail]
type = custom/script
exec = ~/.config/polybar/scripts/gmail.sh
interval = 120
format-prefix = " №Ѓа  "
format-prefix-background = ${colors.white}
format-prefix-foreground = ${colors.background}
label = " %output% "
label-background = ${colors.primary}
label-foreground = ${colors.foreground}
click-left = xdg-open https://mail.google.com/

[module/screencast]
type = custom/script
exec = ~/.config/polybar/scripts/screencast-status.sh
interval = 1

click-left = ~/.config/polybar/scripts/record.sh

[module/github]
type = custom/script
exec = ~/dotfiles/polybar/scripts/git_status.sh
interval = 600

format = <label>
format-prefix = " з░іц "
format-prefix-background = ${colors.white}
format-prefix-foreground = ${colors.background}

label = " %output% "
label-background = ${colors.primary}
label-foreground = ${colors.white}

# ADICIONE ESTA LINHA:
click-left = ~/dotfiles/polybar/scripts/git_status.sh check

[module/redshift]
type = custom/script
# Verifica se o processo 'redshift' est├А rodando
exec = pgrep -x redshift > /dev/null && echo "On" || echo "Off"
# Atualiza a cada 5 segundos
interval = 5

format = <label>
format-prefix = " №ЃФ "
format-prefix-background = ${colors.white}
format-prefix-foreground = ${colors.background}

label = " %output% "
label-background = ${colors.primary}
label-foreground = ${colors.white}

# For├Дamos ele a ler a sua configura├Д├Бo manual
click-left = pgrep -x redshift && pkill redshift || redshift -c ~/.config/redshift/redshift.conf &