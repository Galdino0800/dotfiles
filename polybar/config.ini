; ===========================================================
; VARI√ĀVEIS GLOBAIS
; ===========================================================

[colors]
background     = #292D3E
foreground     = #f0f0f0
primary        = #6D8EC1
secondary      = #e60053
mb             = #34394E
white          = #FFFFFF
red            = #EF5350


; ===========================================================
; BARRAS
; ===========================================================

; ---------------------------
; BARRA SUPERIOR
; ---------------------------

[bar/top]
enable-ipc = true
cursor-click = pointer
width = 100%
height = 20pt
background = ${colors.background}
foreground = ${colors.foreground}
font-0 = "JetBrainsMono Nerd Font:size=10;3"
module-margin = 1

border-size = 5
border-color = ${colors.background}

modules-left = arch-icon i3 xwindow
modules-right = screencast temperature battery bluetooth network cpu memory date


; ---------------------------
; BARRA INFERIOR
; ---------------------------

[bar/bottom]
bottom = true
width = 100%
height = 20pt
background = ${colors.background}
foreground = ${colors.foreground}
font-0 = "JetBrainsMono Nerd Font:size=10;3"
enable-ipc = true
cursor-click = pointer
module-margin = 1

border-size = 5
border-color = ${colors.background}

modules-left = kernel-name
modules-center = mpd-player volume
modules-right = weather gmail xkeyboard


; ===========================================================
; M√ďDULOS
; ===========================================================


; ===========================================================
; SISTEMA
; ===========================================================

[module/uptime]
type = custom/script
exec = uptime -p
interval = 60
format = <label>
label = "%{A1:notify-send "ūüēí Sistema Ativo" "$(uptime -p)":} ÓįĄ %{A}"
label-background = ${colors.red}
label-foreground = ${colors.background}
label-padding = 1


[module/kernel-name]
type = custom/script
exec = uname -r | cut -d '-' -f1
interval = 1000

# Est√©tica (mantendo seu padr√£o de p√≠lula)
format-prefix = " ůįä† "
format-prefix-background = ${colors.white}
format-prefix-foreground = ${colors.background}
label = " %output% "
label-background = ${colors.primary}

# --- COMANDO DE LIMPEZA ---
# Abre o terminal, executa o script e mant√©m a janela aberta at√© o fim
click-right = xfce4-terminal -e "bash /home/ghost/.config/polybar/scripts/clean_system.sh"


[module/cpu]
type = internal/cpu
interval = 2
format = <label>
format-prefix = " Ôíľ "
format-prefix-background = ${colors.white}
format-prefix-foreground = ${colors.background}
label = " %percentage%% "
label-background = ${colors.primary}


[module/memory]
type = internal/memory
interval = 2
format = <label>
format-prefix = " ÓČ¶ "
format-prefix-background = ${colors.white}
format-prefix-foreground = ${colors.background}
label = " %percentage_used%% "
label-background = ${colors.primary}


[module/temperature]
type = internal/temperature
thermal-zone = 0
warn-temperature = 70
format = <label>
format-prefix = " Ôčá "
format-prefix-background = ${colors.secondary}
format-prefix-foreground = ${colors.background}
label = " %temperature-c% "
label-background = ${colors.mb}


[module/updates]
type = custom/script
exec = ~/.config/polybar/scripts/updates.sh
interval = 600
format-prefix = " ůįöį "
format-prefix-background = ${colors.white}
format-prefix-foreground = ${colors.background}
label = " %output% "
label-background = ${colors.primary}
click-left = xfce4-terminal -e yay -Syu


; ===========================================================
; REDE
; ===========================================================

[module/network]
type = internal/network
interface = wlo1
interval = 1.0

format-connected = <label-connected>
format-connected-prefix = " ůįĖ© "
format-connected-prefix-background = ${colors.white}
format-connected-prefix-foreground = ${colors.background}

; Mostra SSID se existir, sen√£o mostra nome da interface
label-connected = "%{A1:xfce4-terminal -e nmtui:} %ifname% %{A}"

label-connected-background = ${colors.primary}
label-connected-foreground = ${colors.background}
label-connected-padding = 1

format-disconnected = <label-disconnected>
format-disconnected-prefix = " ůįĖ™ "
format-disconnected-prefix-background = ${colors.red}
format-disconnected-prefix-foreground = ${colors.background}

label-disconnected = " Offline "
label-disconnected-background = ${colors.mb}
label-disconnected-foreground = ${colors.red}


[module/network-dynamic]
type = custom/script
exec = ~/.config/polybar/scripts/net_activity.sh
interval = 1
tail = true
format-prefix = " ůįĖ© "
format-prefix-background = ${colors.white}
format-prefix-foreground = ${colors.background}
label = "%{A1:xfce4-terminal -e nmtui:} %output% %{A}"
label-background = ${colors.primary}
label-foreground = ${colors.white}
label-padding = 1


; ===========================================================
; ARMAZENAMENTO
; ===========================================================

[module/storage-root]
type = internal/fs
mount-0 = /
interval = 60

format-mounted = <label-mounted>
format-mounted-prefix = " Ôā† / "
format-mounted-prefix-background = ${colors.white}
format-mounted-prefix-foreground = ${colors.background}
label-mounted = " %percentage_used%% "
label-mounted-background = ${colors.primary}
label-mounted-foreground = ${colors.white}


[module/storage-home]
type = internal/fs
mount-0 = /home
interval = 60

format-mounted = <label-mounted>
format-mounted-prefix = " ÔÄē ~ "
format-mounted-prefix-background = ${colors.white}
format-mounted-prefix-foreground = ${colors.background}
label-mounted = " %percentage_used%% "
label-mounted-background = ${colors.primary}
label-mounted-foreground = ${colors.white}

format-unmounted = <label-unmounted>
label-unmounted = %mountpoint% not mounted


; ===========================================================
; √ĀUDIO
; ===========================================================

[module/volume]
type = internal/pulseaudio
format-volume = <ramp-volume><label-volume>

ramp-volume-background = ${colors.white}
ramp-volume-foreground = ${colors.background}
ramp-volume-padding = 1

ramp-volume-0 = ůįēŅ
ramp-volume-1 = ůįĖÄ
ramp-volume-2 = ůįēĺ
ramp-volume-3 = ůįēĺ

label-volume = " %percentage%% "
label-volume-background = ${colors.primary}
label-volume-foreground = ${colors.foreground}

format-muted = <label-muted>
format-muted-prefix = " ůįĚü "
format-muted-prefix-background = ${colors.red}
format-muted-prefix-foreground = ${colors.background}
label-muted = " Muted "
label-muted-background = ${colors.primary}
label-muted-foreground = ${colors.white}

click-left = xfce4-terminal -e ncpamixer
click-right = pavucontrol


; ===========================================================
; M√öSICA / PLAYER
; ===========================================================

[module/mpd-player]
type = custom/script
exec = ~/.config/polybar/scripts/player.sh
interval = 2

# --- O √ćCONE ---
# Quando clicar no √≠cone (prefix), abre o ncmpcpp
format-prefix = "%{A1:xfce4-terminal -e ncmpcpp:} ůįĚö %{A}"
format-prefix-background = ${colors.white}
format-prefix-foreground = ${colors.background}

# --- O NOME DA M√öSICA (LABEL) ---
# Bot√£o Direito (A3): Pr√≥xima m√ļsica
# Bot√£o Esquerdo (A1): M√ļsica anterior
# Rodinha/Meio (A2): Pause/Play (Toggle)
label = "%{A3:mpc next:}%{A1:mpc prev:}%{A2:mpc toggle:} %output% %{A}%{A}%{A}"
label-background = ${colors.primary}
label-foreground = ${colors.white}
label-padding = 1


[module/buttons]
type = internal/mpd
format-online = <icon-prev> <toggle> <icon-next>
format-background = #6D8EC1
format-online-padding = 1
format-online-background = ${colors.background}
format-online-offset = -32
label-padding = 1

icon-play = " ůįźä "
icon-pause = " ůįŹ§ "
icon-stop = " ůįďõ "
icon-prev = " ůįíģ "
icon-next = " ůįí≠ "


[module/tidal-player]
type = custom/script
exec = ~/.config/polybar/scripts/tidal.sh
interval = 2
format-prefix = " ůįďĀ "
format-prefix-background = ${colors.primary}
format-prefix-foreground = ${colors.background}
label = "%{A1:playerctl -p tidal-hifi next:}%{A3:playerctl -p tidal-hifi previous:}%{A2:playerctl -p tidal-hifi play-pause:} %output% %{A}%{A}%{A}"
label-background = ${colors.primary}
label-foreground = ${colors.white}


; ===========================================================
; DATA E JANELAS
; ===========================================================

[module/date]
type = internal/date
interval = 1.0
time =  %a, %I:%M %p
time-alt = "ÔĀ≥ %A, %d %B %Y"
format = <label>
format-prefix = " ůį•Ē "
format-prefix-background = ${colors.white}
format-prefix-foreground = ${colors.background}
